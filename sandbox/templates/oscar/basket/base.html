{% extends "oscar/base.html" %}
{% load theme_tags %}

{% block styles %}
    {{ block.super }}
    {% theme_css_variables %}
    <style>
        /* Global basket styles */
        .table-bordered {
            border-color: #dee2e6;
        }
        
        .table-bordered th {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-color);
            filter: brightness(90%);
        }
        
        .price {
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
{% endblock %}
